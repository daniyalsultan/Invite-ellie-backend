# railway.toml - correct structured format

[build]
  builder = "NIXPACKS"

[phases.setup]
  nixPkgs = ['python311', 'gcc']

[phases.build]
  cmds = ['pip install --no-cache-dir -r requirements/production.txt']

[start]
  cmd = 'gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120'